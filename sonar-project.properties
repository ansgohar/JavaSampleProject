# SonarQube Project Configuration for Java Sample

# Project identification
sonar.projectKey=java-sample
sonar.projectName=Java Sample Project
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Java binaries
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Encoding
sonar.sourceEncoding=UTF-8

# Language
sonar.language=java

# Coverage reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusions (none for this sample - we want to scan everything)
# sonar.exclusions=

# Test exclusions (none for this sample)
# sonar.test.exclusions=

# Quality gate (will be set by command line or use default)
# sonar.qualitygate=standard-quality-gate